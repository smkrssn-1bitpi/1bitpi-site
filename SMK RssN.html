<title>SMK RssN // Collaborative Engineering</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          /* Coastal Tech palette */
          'deep-ocean':   '#0a2540',   /* near-black navy — primary ink */
          'abyss':        '#05162b',   /* deeper navy for panels */
          'tide':         '#0891a6',   /* teal primary */
          'tide-pressed': '#066474',
          'foam':         '#5eead4',   /* mint/aqua accent */
          'seaglass':     '#c8e7e3',   /* pastel seaglass */
          'sand':         '#fef8ed',   /* warm off-white bg */
          'shell':        '#ffe4cc',   /* pastel coral */
          'coral':        '#ff8a65',   /* sunset coral */
          'driftwood':    '#8b7355',   /* muted brown */
          'horizon':      '#d5e6e3',   /* border / separator */
          /* semantic aliases kept so we don't have to rewrite every class */
          'miro-black':   '#0a2540',
          'miro-blue':    '#0891a6',
          'miro-blue-pressed': '#066474',
          'miro-success': '#5eead4',
          'pastel-coral': '#ffb8a3',
          'pastel-teal':  '#c8e7e3',
          'pastel-orange':'#ffe4cc',
          'pastel-rose':  '#ffd4c4',
          'pastel-lilac': '#d9e6ff',
          'miro-border':  '#d5e6e3',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
          retro: ['"Press Start 2P"', 'cursive'],
        },
      },
    },
  };
</script>
<style>
  html, body { background: #fef8ed; color: #0a2540; font-family: 'Inter', sans-serif; }
  body { scroll-behavior: smooth; overflow-x: hidden; }
  ::selection { background: #0891a6; color: #fef8ed; }
  .hero-letter-spacing { letter-spacing: -0.03em; }

  /* Noise overlay */
  .noise {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.45'/></svg>");
  }

  /* Glass card — seaglass tint */
  .glass {
    background: rgba(255,253,248,0.6);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -1px 0 rgba(10,37,64,0.04),
      0 1px 2px rgba(10,37,64,0.05),
      0 8px 32px -12px rgba(8,145,166,0.18);
  }
  .glass-dark {
    background: linear-gradient(155deg, rgba(10,37,64,0.95) 0%, rgba(5,22,43,0.92) 100%);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(94,234,212,0.12);
    box-shadow:
      inset 0 1px 0 rgba(94,234,212,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.4),
      0 24px 60px -20px rgba(10,37,64,0.5);
  }

  /* Terminal dot grid */
  .dot-grid {
    background-image: radial-gradient(circle at 1px 1px, rgba(10,37,64,0.10) 1px, transparent 0);
    background-size: 24px 24px;
  }
  /* Wave grid — horizon lines */
  .wave-grid {
    background-image:
      linear-gradient(to right, rgba(8,145,166,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(8,145,166,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  /* Scrollbar reset inside terminal */
  .thin-scroll::-webkit-scrollbar { width: 6px; }
  .thin-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* Blinking caret */
  @keyframes caretBlink { 50% { opacity: 0; } }
  .caret { display:inline-block; width:8px; height:1em; background:#5eead4; margin-left:3px; vertical-align:-2px; animation: caretBlink 1s step-end infinite; box-shadow: 0 0 8px #5eead4; }

  /* Pulse ring */
  @keyframes pulseRing {
    0% { transform: scale(0.9); opacity: 0.9; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .pulse-ring { animation: pulseRing 1.8s cubic-bezier(0.4,0,0.6,1) infinite; }

  /* Shimmer gradient for headlines — ocean to coral sunset */
  .shimmer {
    background: linear-gradient(100deg, #0a2540 10%, #0891a6 35%, #5eead4 50%, #ff8a65 70%, #0a2540 90%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 100%;
    animation: shimmer 8s linear infinite;
  }
  /* Wave animation for section dividers */
  @keyframes waveFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }

  /* Reduce-motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
