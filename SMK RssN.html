<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1Bitpi — Sites, Webapps e Apps Mobile</title>
<meta name="description" content="A 1Bitpi cria sites, webapps e aplicativos mobile para empresas que querem presença digital profissional. Entregue em 4 semanas, escopo fixo." />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'deep-ocean':   '#0a2540',
          'abyss':        '#05162b',
          'tide':         '#0891a6',
          'tide-pressed': '#066474',
          'foam':         '#5eead4',
          'seaglass':     '#c8e7e3',
          'sand':         '#fef8ed',
          'shell':        '#ffe4cc',
          'coral':        '#ff8a65',
          'driftwood':    '#8b7355',
          'horizon':      '#d5e6e3',
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          mono: ['JetBrains Mono', 'monospace'],
        },
      },
    },
  };
</script>
<style>
  html, body { background: #fef8ed; color: #0a2540; font-family: 'Inter', sans-serif; }
  body { scroll-behavior: smooth; overflow-x: hidden; }
  ::selection { background: #0891a6; color: #fef8ed; }
  .hero-letter-spacing { letter-spacing: -0.03em; }

  .noise {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.45'/></svg>");
  }

  .glass {
    background: rgba(255,253,248,0.6);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -1px 0 rgba(10,37,64,0.04),
      0 1px 2px rgba(10,37,64,0.05),
      0 8px 32px -12px rgba(8,145,166,0.18);
  }
  .glass-dark {
    background: linear-gradient(155deg, rgba(10,37,64,0.95) 0%, rgba(5,22,43,0.92) 100%);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(94,234,212,0.12);
    box-shadow:
      inset 0 1px 0 rgba(94,234,212,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.4),
      0 24px 60px -20px rgba(10,37,64,0.5);
  }

  .shimmer {
    background: linear-gradient(100deg, #0a2540 10%, #0891a6 35%, #5eead4 50%, #ff8a65 70%, #0a2540 90%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 100%;
    animation: shimmer 8s linear infinite;
  }

  @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body class="antialiased">

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<!-- Framer Motion -->
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>

<script type="text/babel" src="src/services.jsx"></script>
<script type="text/babel" src="src/client-filter.jsx"></script>
<script type="text/babel" src="src/footer.jsx"></script>

<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
